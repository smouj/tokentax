<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO -->
  <title>TokenTax AI PRO | +400 Modelos de IA</title>
  <meta name="title" content="TokenTax AI PRO | Compara +400 Modelos de IA - Precios 2026">
  <meta name="description" content="Compara +400 modelos de IA. Encuentra el más barato. OpenAI, Anthropic, Gemini, Grok, Mistral, DeepSeek. Precios en tiempo real.">
  <meta name="keywords" content="AI, LLM, pricing, cost comparison, OpenAI, Anthropic, Claude, Gemini, GPT-4, token pricing, API costs">
  <meta name="author" content="smouj">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#000000">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://smouj.github.io/tokentax/">
  <meta property="og:title" content="TokenTax AI PRO | +400 Modelos de IA">
  <meta property="og:description" content="Compara precios de +400 modelos de IA. Encuentra el más barato.">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="TokenTax AI PRO">
  
  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "TokenTax AI PRO",
    "description": "Compara +400 modelos de IA",
    "url": "https://smouj.github.io/tokentax/"
  }
  </script>
  
  <!-- Tailwind + Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text: #fafafa;
      --text-dim: #737373;
      --accent: #ffffff;
      --green: #22c55e;
      --radius: 2px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { 
      font-size: 14px; 
      -webkit-font-smoothing: antialiased;
    }
    
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    
    /* Square minimalist */
    .square-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    
    .input-square {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s;
    }
    
    .input-square:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn-square {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      transition: all 0.15s;
    }
    
    .btn-square:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    .btn-square:active {
      transform: scale(0.98);
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .anim { animation: fadeIn 0.3s ease forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.02s; }
    .delay-2 { animation-delay: 0.04s; }
    .delay-3 { animation-delay: 0.06s; }
    .delay-4 { animation-delay: 0.08s; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    
    /* Table */
    .table-row {
      transition: background 0.1s;
    }
    
    .table-row:hover {
      background: rgba(255,255,255,0.03);
    }
    
    /* Logo */
    .logo {
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Toast */
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .toast-in { animation: toastIn 0.2s ease forwards; }
    
    /* Compact spacing */
    .gap-xs { gap: 6px; }
    .gap-sm { gap: 10px; }
    .gap-md { gap: 14px; }
    
    .p-xs { padding: 8px; }
    .p-sm { padding: 12px; }
    .p-md { padding: 16px; }
    
    .text-xs { font-size: 0.7rem; }
    .text-sm { font-size: 0.8rem; }
    .text-base { font-size: 0.9rem; }
  </style>
</head>
<body class="flex flex-col">
  
  <!-- Toast -->
  <div id="toast" class="fixed top-3 right-3 z-50"></div>

  <!-- Header -->
  <header class="square-panel border-t-0 border-l-0 border-r-0 flex-shrink-0">
    <div class="flex items-center justify-between px-4 py-2.5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 square-panel flex items-center justify-center font-bold text-lg logo">
          T
        </div>
        <div>
          <h1 class="font-semibold text-sm tracking-tight">TokenTax <span class="text-[#737373]">AI</span></h1>
          <p class="text-[10px] text-[#525252] uppercase tracking-wider">+400 Modelos</p>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1.5 px-2 py-1 square-panel text-[10px] text-[#525252]">
          <span id="loader" class="w-1.5 h-1.5 rounded-full bg-[#333]"></span>
          <span id="modelText">Cargando...</span>
        </div>
        <button onclick="toggleTheme()" id="themeBtn" class="w-7 h-7 square-panel flex items-center justify-center text-xs hover:bg-[#1a1a1a]">🌙</button>
        <a href="https://github.com/smouj/tokentax" target="_blank" class="w-7 h-7 square-panel flex items-center justify-center hover:bg-[#1a1a1a]">
          <svg class="w-3.5 h-3.5 text-[#525252]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Main - Full height -->
  <main class="flex-1 flex gap-3 p-3 min-h-0">
    
    <!-- Left Panel -->
    <div class="w-[320px] flex-shrink-0 flex flex-col gap-2">
      
      <!-- Prompt -->
      <div class="square-panel p-sm flex flex-col flex-1 min-h-0">
        <div class="flex justify-between items-center mb-2">
          <span class="text-[10px] text-[#525252] font-medium">PROMPT</span>
          <button onclick="clearPrompt()" class="text-[10px] text-[#333] hover:text-[#666]">✕</button>
        </div>
        <textarea id="prompt" class="flex-1 w-full bg-transparent text-sm resize-none focus:outline-none placeholder:text-[#333]" placeholder="Tu prompt..."></textarea>
        <div class="flex justify-between mt-2 text-[9px] text-[#404040]">
          <span id="charCount">0 ch</span>
          <span id="tokenCount">~0 tk</span>
        </div>
      </div>

      <!-- Output -->
      <div class="square-panel p-sm">
        <label class="block text-[10px] text-[#525252] font-medium mb-1.5">OUTPUT TOKENS</label>
        <input type="number" id="outputTokens" value="500" class="w-full bg-transparent text-xl font-semibold text-center focus:outline-none">
      </div>

      <!-- Calculate -->
      <button onclick="calcularCostos()" class="btn-square py-2.5 text-sm">
        ⚡ CALCULAR
      </button>

      <!-- Quick -->
      <div class="flex gap-1.5">
        <button onclick="useExample('code')" class="flex-1 py-1.5 square-panel text-[9px] hover:bg-[#1a1a1a]">📝 Código</button>
        <button onclick="useExample('summary')" class="flex-1 py-1.5 square-panel text-[9px] hover:bg-[#1a1a1a]">📝 Resumen</button>
      </div>

      <!-- Stats -->
      <div class="square-panel p-sm">
        <div class="flex justify-between text-[9px] mb-1">
          <span class="text-[#525252]">Cálculos</span>
          <span id="totalCalcs" class="text-[#737373]">0</span>
        </div>
        <div class="flex justify-between text-[9px]">
          <span class="text-[#525252]">Ahorrado</span>
          <span id="totalSaved" class="text-[#22c55e]">$0</span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="flex-1 square-panel flex flex-col min-w-0">
      
      <!-- Filters -->
      <div class="p-sm border-b border-[#1f1f1f] flex gap-2">
        <div class="flex-1 relative">
          <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[#333] text-xs">🔍</span>
          <input id="search" type="text" placeholder="Buscar..." class="w-full pl-7 pr-2 py-1.5 input-square text-xs">
        </div>
        <select id="providerFilter" class="px-2 py-1.5 input-square text-xs min-w-[100px]">
          <option value="">Todos</option>
        </select>
        <button onclick="exportCSV()" id="exportBtn" class="hidden px-2 py-1.5 bg-[#1a1a1a] text-[9px]">CSV</button>
        <button onclick="copyTop()" id="copyBtn" class="hidden px-2 py-1.5 bg-[#1a1a1a] text-[9px]">Copy</button>
      </div>

      <!-- Stats Bar -->
      <div id="statsBar" class="hidden px-3 py-1.5 bg-[#111] border-b border-[#1f1f1f] flex gap-4 text-[9px]">
        <div><span class="text-[#525252]">Min:</span> <span id="minCost" class="text-[#22c55e]">-</span></div>
        <div><span class="text-[#525252]">Max:</span> <span id="maxCost" class="text-[#ef4444]">-</span></div>
        <div><span class="text-[#525252]">Media:</span> <span id="avgCost" class="text-[#737373]">-</span></div>

     ></div>
      <!-- Table Header -->
      <div class="grid grid-cols-6 px-3 py-2 bg-[#0f0f0f] text-[9px] font-medium text-[#404040] uppercase">
        <div class="cursor-pointer hover:text-[#737373]" onclick="sortBy('provider')">Proveedor</div>
        <div class="col-span-2 cursor-pointer hover:text-[#737373]" onclick="sortBy('name')">Modelo</div>
        <div class="text-right cursor-pointer hover:text-[#737373]" onclick="sortBy('input')">Input</div>
        <div class="text-right cursor-pointer hover:text-[#737373]" onclick="sortBy('output')">Output</div>
        <div class="text-right cursor-pointer hover:text-[#737373]" onclick="sortBy('total')">Coste</div>
      </div>

      <!-- Results -->
      <div class="flex-1 overflow-y-auto">
        <div id="emptyState" class="h-full flex flex-col items-center justify-center text-[#333]">
          <p class="text-sm">Introduce prompt + calcula</p>
          <p class="text-xs mt-1 text-[#262626]">Ctrl+Enter</p>
        </div>
        <table class="w-full text-xs">
          <tbody id="tableBody" class="hidden"></tbody>
        </table>
      </div>

      <!-- Footer -->
      <div class="px-3 py-1.5 border-t border-[#1f1f1f] flex justify-between text-[9px] text-[#333]">
        <span id="count"></span>
        <span>LiteLLM</span>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="flex-shrink-0 border-t border-[#1f1f1f] py-1.5">
    <div class="text-center text-[9px] text-[#262626]">
      TokenTax • +400 Modelos • <a href="https://github.com/smouj/tokentax" class="text-[#404040] hover:text-[#666]">GitHub</a>
    </div>
  </footer>

  <script>
    // State
    let allModels = [], results = [], isDark = true, sortF = 'input', sortA = true;
    let stats = { calcs: 0, saved: 0 };

    // Init
    (function() {
      try {
        const s = JSON.parse(localStorage.getItem('tt_stats') || '{"calcs":0,"saved":0}');
        stats = s;
        updateStats();
      } catch(e) {}
      
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
        document.getElementById('themeBtn').textContent = '☀️';
        isDark = false;
      }
    })();

    function updateStats() {
      document.getElementById('totalCalcs').textContent = stats.calcs;
      document.getElementById('totalSaved').textContent = '$' + stats.saved.toFixed(2);
    }

    function saveStats() {
      localStorage.setItem('tt_stats', JSON.stringify(stats));
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-in mb-2 px-3 py-1.5 square-panel text-xs';
      t.textContent = msg;
      document.getElementById('toast').appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    function toggleTheme() {
      const btn = document.getElementById('themeBtn');
      if (isDark) {
        document.documentElement.classList.add('light');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.remove('light');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      }
      isDark = !isDark;
    }

    function clearPrompt() {
      document.getElementById('prompt').value = '';
      updateCount();
    }

    function useExample(type) {
      const ex = {
        code: '// React login\nfunction Login() {\n  const [e, s] = useState("");\n  return <input value={e}/>;\n}',
        summary: 'Write a summary about AI impact on software development.'
      };
      document.getElementById('prompt').value = ex[type];
      updateCount();
      toast('Ejemplo');
    }

    function sortBy(f) {
      if (sortF === f) sortA = !sortA;
      else { sortF = f; sortA = true; }
      calcularCostos();
    }

    function copyTop() {
      if (!results.length) return;
      const t = results[0];
      navigator.clipboard.writeText(`${t.provider} - ${t.fullName}: $${t.total.toFixed(4)}`);
      toast('Copiado');
    }

    // Load data
    async function loadModels() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json');
        const data = await res.json();
        
        allModels = Object.keys(data)
          .filter(k => {
            const m = data[k];
            return m.mode === "chat" && typeof m.input_cost_per_token === "number" && typeof m.output_cost_per_token === "number" && m.input_cost_per_token > 0;
          })
          .map(k => {
            const m = data[k];
            return {
              provider: (m.litellm_provider || 'other').charAt(0).toUpperCase() + (m.litellm_provider || 'other').slice(1),
              name: k.length > 40 ? k.substring(0,37) + '...' : k,
              fullName: k,
              input: parseFloat((m.input_cost_per_token * 1e6).toFixed(4)),
              output: parseFloat((m.output_cost_per_token * 1e6).toFixed(4))
            };
          });

        const provs = [...new Set(allModels.map(m => m.provider))].sort();
        const sel = document.getElementById('providerFilter');
        provs.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });

        document.getElementById('loader').classList.add('bg-[#22c55e]');
        document.getElementById('modelText').textContent = allModels.length + ' model';
      } catch(e) {
        document.getElementById('modelText').textContent = 'Error';
        toast('Error', 'error');
      }
    }

    function estTokens(t) { return t ? Math.ceil(t.length / 4) : 0; }
    
    function updateCount() {
      const v = document.getElementById('prompt').value;
      document.getElementById('charCount').textContent = v.length + ' ch';
      document.getElementById('tokenCount').textContent = '~' + estTokens(v) + ' tk';
    }

    function calcularCostos() {
      const prompt = document.getElementById('prompt').value;
      const out = parseFloat(document.getElementById('outputTokens').value) || 0;
      const inT = estTokens(prompt);

      if (!allModels.length) { toast('Cargando...'); return; }

      results = filtrar().map(m => ({ ...m, total: (inT * m.input + out * m.output) / 1e6 }));
      
      if (!results.length) { toast('Sin resultados'); return; }

      results.sort((a, b) => {
        const av = a[sortF], bv = b[sortF];
        return typeof av === 'string' ? (sortA ? av.localeCompare(bv) : bv.localeCompare(av)) : (sortA ? av - bv : bv - av);
      });

      // Stats
      const min = results[0].total, max = results[results.length-1].total, avg = results.reduce((a,b) => a + b.total, 0) / results.length;
      document.getElementById('minCost').textContent = '$' + min.toFixed(4);
      document.getElementById('maxCost').textContent = '$' + max.toFixed(4);
      document.getElementById('avgCost').textContent = '$' + avg.toFixed(4);
      document.getElementById('statsBar').classList.remove('hidden');

      // Save stats
      if (prompt.length > 0) {
        stats.calcs++;
        stats.saved += (max - min);
        updateStats();
        saveStats();
      }

      // Render
      let html = '';
      results.forEach((m, i) => {
        const top = i < 3;
        html += `<tr class="table-row border-b border-[#141414]">
          <td class="px-2 py-1.5 font-medium ${top ? 'text-[#22c55e]' : 'text-[#a1a1a1]'}">${m.provider}</td>
          <td class="col-span-2 px-2 py-1.5 text-[10px] text-[#525252]">${m.name}</td>
          <td class="px-2 py-1.5 text-right text-[#404040]">$${m.input.toFixed(2)}</td>
          <td class="px-2 py-1.5 text-right text-[#404040]">$${m.output.toFixed(2)}</td>
          <td class="px-2 py-1.5 text-right font-semibold ${top ? 'text-[#22c55e]' : 'text-[#e5e5e5]'}">$${m.total.toFixed(4)}</td>
        </tr>`;
      });

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('tableBody').innerHTML = html;
      document.getElementById('tableBody').classList.remove('hidden');
      document.getElementById('count').textContent = results.length + ' model';
      document.getElementById('exportBtn').classList.remove('hidden');
      document.getElementById('copyBtn').classList.remove('hidden');
    }

    function filtrar() {
      const s = document.getElementById('search').value.toLowerCase();
      const p = document.getElementById('providerFilter').value;
      return allModels.filter(m => (!s || m.name.toLowerCase().includes(s) || m.provider.toLowerCase().includes(s)) && (!p || m.provider === p));
    }

    function exportCSV() {
      if (!results.length) return;
      const csv = [['Proveedor','Modelo','Input','Output','Coste'], ...results.map(m => [m.provider,m.fullName,m.input,m.output,m.total.toFixed(4)])].map(r => r.join(',')).join('\n');
      const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv])); a.download = 'tokentax.csv'; a.click();
      toast('CSV');
    }

    // Events
    ['search','providerFilter'].forEach(id => document.getElementById(id).addEventListener('input', calcularCostos));
    document.getElementById('prompt').addEventListener('input', () => { updateCount(); if (!document.getElementById('tableBody').classList.contains('hidden')) calcularCostos(); });
    document.getElementById('outputTokens').addEventListener('input', () => { if (!document.getElementById('tableBody').classList.contains('hidden')) calcularCostos(); });
    document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); calcularCostos(); } });
    window.onload = () => { loadModels(); updateCount(); };
  </script>
</body>
</html>
