  <!-- Main -->

            <div class="cursor-pointer hover:text-white/60" onclick="sortBy('provider')" role="button" tabindex="0">Proveedor</div>
            <div class="col-span-2 cursor-pointer hover:text-white/60" onclick="sortBy('name')" role="button" tabindex="0">Modelo</div>

            <div class="text-right cursor-pointer hover:text-white/60" onclick="sortBy('output')" role="button" tabindex="0">Output</div>

          <!-- Results -->
          <div class="h-[calc(100%-120px)] overflow-y-auto" role="region" aria-label="Resultados">

            <table class="w-full text-sm" role="table" aria-label="Modelos">

  <footer class="border-t border-white/5 py-6 animate-enter delay-4">

      <p class="text-[10px] text-white/15 mt-1">© 2026 smouj • <a href="https://github.com/smouj/tokentax" class="text-white/30 hover:text-white/50 transition">GitHub</a></p>
    </div>
  </footer>

  <script>
    // Particles
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animation = `particleFloat ${4 + Math.random() * 4}s ease-in-out infinite`;
        p.style.animationDelay = Math.random() * 4 + 's';
        container.appendChild(p);
      }
    })();

    // State
    let allModels = [], currentResults = [], isDark = true, sortField = 'input', sortAsc = true;

    // Toast
    function showToast(msg, type = 'success') {
      const colors = { 
        success: 'bg-white/10 border-white/15', 
        error: 'bg-red-500/20 border-red-500/30', 
        info: 'bg-blue-500/20 border-blue-500/30' 
      };
      const t = document.createElement('div');
      t.className = `toast-in px-4 py-2.5 rounded-lg border ${colors[type]} text-xs backdrop-blur-xl`;
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    // Theme toggle
    function toggleTheme() {
      const btn = document.getElementById('themeBtn');
      if (isDark) {
        document.documentElement.classList.add('light');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.remove('light');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      }
      isDark = !isDark;
    }

    // Clear prompt
    function clearPrompt() {
      document.getElementById('prompt').value = '';
      updateCount();
      showToast('Limpiado');
    }

    // Load example
    function useExample(type) {
      const ex = {
        code: `// Create a React login form component
function LoginForm() {
  const [email, setEmail] = useState("");
  const handleSubmit = (e) => {
    e.preventDefault();
    console.log(email);
  };
  return (
    <form onSubmit={handleSubmit}>
      <input 
        type="email" 
        value={email}
        onChange={(e) => setEmail(e.target.value)}
        placeholder="Email"
      />
      <button type="submit">Login</button>
    </form>
  );
}`,
        summary: `Write a comprehensive summary about how artificial intelligence is transforming software development. Include examples of code generation, automated testing, bug detection, and the future of programming with AI assistants.`
      };
      document.getElementById('prompt').value = ex[type];
      updateCount();
      showToast('Ejemplo cargado');
    }

    // Sort
    function sortBy(field) {
      if (sortField === field) {
        sortAsc = !sortAsc;
      } else {
        sortField = field;
        sortAsc = true;
      }
      calcularCostos();
    }

    // Copy top result
    function copyTopResult() {
      if (!currentResults.length) return;
      const top = currentResults[0];
      const text = `${top.provider} - ${top.fullName}\nCoste: $${top.total.toFixed(4)}\nInput: $${top.input}/M | Output: $${top.output}/M`;
      navigator.clipboard.writeText(text);
      showToast('Copiado al portapapeles');
    }

    // Init theme
    (function() {
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
        document.getElementById('themeBtn').textContent = '☀️';
        isDark = false;
      }
    })();

    // Load models from LiteLLM (real data)
    async function cargarModelos() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json');
        const data = await res.json();
        
        // Filter only chat models with valid pricing
        allModels = Object.keys(data)
          .filter(key => {
            const m = data[key];
            return m.mode === "chat" && 
              typeof m.input_cost_per_token === "number" && 
              typeof m.output_cost_per_token === "number" &&
              m.input_cost_per_token > 0;
          })
          .map(key => {
            const m = data[key];
            const provider = m.litellm_provider || "other";
            return {
              provider: provider.charAt(0).toUpperCase() + provider.slice(1),
              name: key.length > 45 ? key.substring(0,42) + "..." : key,
              fullName: key,
              input: parseFloat((m.input_cost_per_token * 1e6).toFixed(4)),
              output: parseFloat((m.output_cost_per_token * 1e6).toFixed(4))
            };
          });

        // Populate provider filter
        const providers = [...new Set(allModels.map(m => m.provider))].sort();
        const sel = document.getElementById('providerFilter');
        providers.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          sel.appendChild(opt);
        });

        document.getElementById('loader').classList.add('bg-green-500');
        document.getElementById('modelText').textContent = `${allModels.length} modelos`;
        
        console.log(`✅ TokenTax: ${allModels.length} modelos cargados desde LiteLLM`);
      } catch(e) {
        console.error('Error cargando modelos:', e);
        document.getElementById('modelText').textContent = "Error";
        showToast('Error al cargar datos', 'error');
      }
    }

    // Token estimation
    function estimateTokens(text) {
      return text ? Math.ceil(text.length / 4) : 0;
    }
    
    // Update char/token count
    function updateCount() {
      const v = document.getElementById('prompt').value;
      document.getElementById('charCount').textContent = v.length + ' chars';
      document.getElementById('tokenCount').textContent = '~' + estimateTokens(v) + ' tokens';
    }

    // Calculate costs
    function calcularCostos() {
      const prompt = document.getElementById('prompt').value;
      const outTokens = parseFloat(document.getElementById('outputTokens').value) || 0;
      const inTokens = estimateTokens(prompt);

      if (!allModels.length) {
        showToast('Cargando modelos...', 'info');
        return;
      }

      // Calculate costs for each model
      currentResults = filtrar().map(m => ({
        ...m,
        total: (inTokens * m.input + outTokens * m.output) / 1e6
      }));
      
      if (!currentResults.length) {
        showToast('Sin resultados', 'error');
        return;
      }

      // Sort
      currentResults.sort((a, b) => {
        const av = a[sortField], bv = b[sortField];
        if (typeof av === 'string') {
          return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        }
        return sortAsc ? av - bv : bv - av;
      });

      // Build table
      let html = '';
      currentResults.forEach((m, i) => {
        const top3 = i < 3;
        html += `<tr class="table-row border-b border-white/[0.03]">
          <td class="px-3 py-2.5 font-medium ${top3 ? 'text-green-400' : 'text-white/70'}">${m.provider}</td>
          <td class="col-span-2 px-3 py-2.5 font-mono text-[11px] text-white/40" title="${m.fullName}">${m.name}</td>
          <td class="px-3 py-2.5 text-right font-mono text-white/35">$${m.input.toFixed(4)}</td>
          <td class="px-3 py-2.5 text-right font-mono text-white/35">$${m.output.toFixed(4)}</td>
          <td class="px-3 py-2.5 text-right font-semibold ${top3 ? 'text-green-400' : 'text-white'}">$${m.total.toFixed(4)}</td>
        </tr>`;
      });

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('tableBody').innerHTML = html;
      document.getElementById('tableBody').classList.remove('hidden');
      document.getElementById('count').textContent = currentResults.length + ' modelos';
      document.getElementById('exportBtn').classList.remove('hidden');
      document.getElementById('copyBtn').classList.remove('hidden');

      // Row animations
      document.querySelectorAll('#tableBody tr').forEach((r, i) => {
        r.style.animationDelay = (i * 0.015) + 's';
      });
    }

    // Filter
    function filtrar() {
      const search = document.getElementById('search').value.toLowerCase().trim();
      const provider = document.getElementById('providerFilter').value;
      return allModels.filter(m => 
        (!search || m.name.toLowerCase().includes(search) || m.provider.toLowerCase().includes(search)) && 
        (!provider || m.provider === provider)
      );
    }

    // Export CSV (real data)
    function exportCSV() {
      if (!currentResults.length) {
        showToast('Nada que exportar', 'error');
        return;
      }
      
      const headers = ['Proveedor', 'Modelo', 'Input $/M', 'Output $/M', 'Coste $'];
      const rows = currentResults.map(m => [
        m.provider,
        m.fullName,
        m.input.toFixed(4),
        m.output.toFixed(4),
        m.total.toFixed(4)
      ]);
      
      const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `tokentax-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('CSV descargado');
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', calcularCostos);
    document.getElementById('providerFilter').addEventListener('change', calcularCostos);
    
    document.getElementById('prompt').addEventListener('input', () => {
      updateCount();
      if (!document.getElementById('tableBody').classList.contains('hidden')) {
        calcularCostos();
      }
    });
    
    document.getElementById('outputTokens').addEventListener('input', () => {
      if (!document.getElementById('tableBody').classList.contains('hidden')) {
        calcularCostos();
      }
    });
    
    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        calcularCostos();
      }
    });

    // Init
    window.onload = () => {
      cargarModelos();
      updateCount();
    };
  </script>
</body>
</html>
