<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>TokenTax AI PRO | +400 Modelos de IA</title>
  <meta name="title" content="TokenTax AI PRO | Compara +400 Modelos de IA">
  <meta name="description" content="Compara +400 modelos de IA. Encuentra el más barato.">
  <meta name="keywords" content="AI, LLM, pricing, OpenAI, Anthropic, Claude, Gemini">
  <meta name="author" content="smouj">
  <meta name="theme-color" content="#000000">
  
  <link rel="manifest" href="manifest.json">
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://smouj.github.io/tokentax/">
  <meta property="og:title" content="TokenTax AI PRO | +400 Modelos de IA">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Dark theme (default) */
    :root, .theme-dark {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-2: #111111;
      --surface-3: #141414;
      --border: #1f1f1f;
      --border-2: #2a2a2a;
      --text: #fafafa;
      --text-2: #a3a3a3;
      --text-3: #525252;
      --text-4: #404040;
      --placeholder: #525252;
      --accent: #ffffff;
      --green: #22c55e;
      --green-dim: #166534;
      --red: #ef4444;
      --red-dim: #991b1b;
    }
    
    /* Light theme */
    .theme-light {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --surface-2: #e5e5e5;
      --surface-3: #d4d4d4;
      --border: #d4d4d4;
      --border-2: #a3a3a3;
      --text: #171717;
      --text-2: #525252;
      --text-3: #737373;
      --text-4: #a3a3a3;
      --placeholder: #737373;
      --accent: #000000;
      --green: #16a34a;
      --green-dim: #dcfce7;
      --red: #dc2626;
      --red-dim: #fee2e2;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { 
      font-size: 14px; 
      -webkit-font-smoothing: antialiased;
    }
    
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      transition: background 0.2s, color 0.2s;
    }
    
    /* Panels */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    
    .panel-hover:hover {
      background: var(--surface-3);
      border-color: var(--border-2);
    }
    
    /* Inputs */
    .input-field {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      transition: all 0.15s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .input-field::placeholder {
      color: var(--placeholder);
    }
    
    select.input-field {
      color: var(--text);
      cursor: pointer;
    }
    
    select.input-field option {
      background: var(--surface);
      color: var(--text);
    }
    
    /* Button */
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 2px;
      font-weight: 600;
      transition: all 0.15s;
      cursor: pointer;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .anim { animation: fadeIn 0.3s ease forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.02s; }
    .delay-2 { animation-delay: 0.04s; }
    .delay-3 { animation-delay: 0.06s; }
    .delay-4 { animation-delay: 0.08s; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    
    /* Table */
    .table-row {
      transition: background 0.1s;
      cursor: pointer;
    }
    
    .table-row:hover {
      background: var(--surface-3) !important;
    }
    
    /* Logo */
    .logo-text {
      background: linear-gradient(135deg, var(--text) 0%, var(--text-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Toast */
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .toast-in { animation: toastIn 0.2s ease forwards; }
    
    /* Colors */
    .text-primary { color: var(--text); }
    .text-secondary { color: var(--text-2); }
    .text-tertiary { color: var(--text-3); }
    .text-green { color: var(--green); }
    .text-red { color: var(--red); }
    
    /* Stats bar */
    .stats-bar {
      background: var(--green-dim);
    }
    .theme-dark .stats-bar {
      background: rgba(34, 197, 94, 0.1);
    }
    .theme-light .stats-bar {
      background: var(--green-dim);
    }
    
    /* Left panel flex */
    .left-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .left-panel > * {
      flex-shrink: 0;
    }
    
    .left-panel > .flex-1 {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body class="theme-dark">
  
  <!-- Toast -->
  <div id="toast" class="fixed top-3 right-3 z-50"></div>

  <!-- Header -->
  <header class="panel border-t-0 border-l-0 border-r-0 flex-shrink-0">
    <div class="flex items-center justify-between px-4 py-2">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 panel flex items-center justify-center font-bold text-lg logo-text">
          T
        </div>
        <div>
          <h1 class="font-semibold text-sm tracking-tight">TokenTax <span class="text-secondary">AI</span></h1>
          <p class="text-[10px] text-tertiary uppercase tracking-wider">+400 Modelos</p>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1.5 px-2 py-1 panel text-[10px] text-tertiary">
          <span id="loader" class="w-1.5 h-1.5 rounded-full bg-tertiary"></span>
          <span id="modelText">Cargando...</span>
        </div>
        <button onclick="toggleTheme()" id="themeBtn" class="w-7 h-7 panel panel-hover flex items-center justify-center text-xs" title="Cambiar tema">🌙</button>
        <a href="https://github.com/smouj/tokentax" target="_blank" class="w-7 h-7 panel panel-hover flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-secondary" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Main - Full height -->
  <main class="flex-1 flex gap-2 p-2 min-h-0">
    
    <!-- Left Panel - Fixed height matching right -->
    <div class="w-[300px] flex-shrink-0 panel p-2 flex flex-col gap-2">
      
      <!-- Prompt -->
      <div class="panel p-2 flex flex-col flex-1 min-h-0">
        <div class="flex justify-between items-center mb-1.5">
          <span class="text-[10px] text-secondary font-medium">PROMPT</span>
          <button onclick="clearPrompt()" class="text-[10px] text-tertiary hover:text-primary">✕</button>
        </div>
        <textarea id="prompt" class="flex-1 w-full bg-transparent text-sm resize-none focus:outline-none placeholder:text-tertiary" placeholder="Tu prompt..."></textarea>
        <div class="flex justify-between mt-1.5 text-[9px] text-tertiary">
          <span id="charCount">0 ch</span>
          <span id="tokenCount">~0 tk</span>
        </div>
      </div>

      <!-- Output -->
      <div class="panel p-2">
        <label class="block text-[10px] text-secondary font-medium mb-1">OUTPUT TOKENS</label>
        <input type="number" id="outputTokens" value="500" class="w-full bg-transparent text-lg font-semibold text-center focus:outline-none">
      </div>

      <!-- Calculate -->
      <button onclick="calcularCostos()" class="btn-primary py-2 text-sm">
        ⚡ CALCULAR
      </button>

      <!-- Quick -->
      <div class="flex gap-1">
        <button onclick="useExample('code')" class="flex-1 py-1.5 panel panel-hover text-[9px]">📝 Código</button>
        <button onclick="useExample('summary')" class="flex-1 py-1.5 panel panel-hover text-[9px]">📝 Resumen</button>
      </div>

      <!-- Stats -->
      <div class="panel p-2">
        <div class="flex justify-between text-[9px] mb-1">
          <span class="text-secondary">Cálculos</span>
          <span id="totalCalcs" class="text-primary">0</span>
        </div>
        <div class="flex justify-between text-[9px]">
          <span class="text-secondary">Ahorrado</span>
          <span id="totalSaved" class="text-green">$0</span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="flex-1 panel flex flex-col min-w-0">
      
      <!-- Filters -->
      <div class="p-2 border-b flex gap-2" style="border-color: var(--border)">
        <div class="flex-1 relative">
          <span class="absolute left-2 top-1/2 -translate-y-1/2 text-tertiary text-xs">🔍</span>
          <input id="search" type="text" placeholder="Buscar modelo..." class="w-full pl-7 pr-2 py-1.5 input-field text-xs">
        </div>
        <select id="providerFilter" class="px-2 py-1.5 input-field text-xs min-w-[110px]">
          <option value="">Todos los proveedores</option>
        </select>
        <button onclick="exportCSV()" id="exportBtn" class="hidden px-2 py-1.5 panel panel-hover text-[9px]">CSV</button>
        <button onclick="copyTop()" id="copyBtn" class="hidden px-2 py-1.5 panel panel-hover text-[9px]">Copy</button>
      </div>

      <!-- Stats Bar -->
      <div id="statsBar" class="hidden px-3 py-1.5 flex gap-4 text-[9px] stats-bar">
        <div><span class="text-secondary">Min:</span> <span id="minCost" class="text-green font-medium">-</span></div>
        <div><span class="text-secondary">Max:</span> <span id="maxCost" class="text-red font-medium">-</span></div>
        <div><span class="text-secondary">Media:</span> <span id="avgCost" class="text-primary font-medium">-</span></div>
        <div class="ml-auto"><span class="text-secondary">Top:</span> <span id="topProvider" class="text-green font-medium">-</span></div>
      </div>

      <!-- Table Header - Sortable -->
      <div class="grid grid-cols-6 px-3 py-1.5 text-[9px] font-medium text-tertiary uppercase" style="background: var(--surface-2)">
        <div class="cursor-pointer hover:text-primary flex items-center gap-1" onclick="sortBy('provider')">
          Proveedor <span class="sort-icon" data-sort="provider">↕</span>
        </div>
        <div class="col-span-2 cursor-pointer hover:text-primary flex items-center gap-1" onclick="sortBy('name')">
          Modelo <span class="sort-icon" data-sort="name">↕</span>
        </div>
        <div class="text-right cursor-pointer hover:text-primary flex items-center justify-end gap-1" onclick="sortBy('input')">
          Input <span class="sort-icon" data-sort="input">↕</span>
        </div>
        <div class="text-right cursor-pointer hover:text-primary flex items-center justify-end gap-1" onclick="sortBy('output')">
          Output <span class="sort-icon" data-sort="output">↕</span>
        </div>
        <div class="text-right cursor-pointer hover:text-primary flex items-center justify-end gap-1" onclick="sortBy('total')">
          Coste <span class="sort-icon" data-sort="total">↕</span>
        </div>
      </div>

      <!-- Results -->
      <div class="flex-1 overflow-y-auto">
        <div id="emptyState" class="h-full flex flex-col items-center justify-center text-tertiary">
          <p class="text-sm">Introduce prompt + calcula</p>
          <p class="text-xs mt-1" style="color: var(--text-4)">Ctrl+Enter</p>
        </div>
        <div id="errorState" class="hidden h-full flex flex-col items-center justify-center text-red">
          <p class="text-sm" id="errorMsg">Error</p>
          <button onclick="loadModels()" class="text-xs mt-2 underline">Reintentar</button>
        </div>
        <table class="w-full text-xs">
          <tbody id="tableBody" class="hidden"></tbody>
        </table>
      </div>

      <!-- Footer -->
      <div class="px-3 py-1.5 border-t flex justify-between text-[9px] text-tertiary" style="border-color: var(--border)">
        <span id="count"></span>
        <span>LiteLLM</span>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="flex-shrink-0 border-t p-2" style="border-color: var(--border)">
    <div class="text-center text-[9px] text-tertiary">
      TokenTax • +400 Modelos • <a href="https://github.com/smouj/tokentax" class="hover:text-primary">GitHub</a>
    </div>
  </footer>

  <script>
    // State
    let allModels = [], results = [], isDark = true, sortF = 'input', sortA = true;
    let stats = { calcs: 0, saved: 0 };

    // Init
    (function() {
      try {
        const s = JSON.parse(localStorage.getItem('tt_stats') || '{"calcs":0,"saved":0}');
        stats = s;
        updateStats();
      } catch(e) {}
      
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
        document.getElementById('themeBtn').textContent = '☀️';
        isDark = false;
      }
    })();

    function updateStats() {
      document.getElementById('totalCalcs').textContent = stats.calcs;
      document.getElementById('totalSaved').textContent = '$' + stats.saved.toFixed(2);
    }

    function saveStats() {
      localStorage.setItem('tt_stats', JSON.stringify(stats));
    }

    function toast(msg, type = 'info') {
      const colors = {
        info: 'var(--surface)',
        success: 'var(--green-dim)',
        error: 'var(--red-dim)'
      };
      const t = document.createElement('div');
      t.className = 'toast-in mb-2 px-3 py-1.5 panel text-xs';
      t.style.background = colors[type] || colors.info;
      t.textContent = msg;
      document.getElementById('toast').appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function updateSortIcons() {
      document.querySelectorAll('.sort-icon').forEach(el => {
        const field = el.dataset.sort;
        if (field === sortF) {
          el.textContent = sortA ? '↑' : '↓';
          el.classList.add('text-green');
        } else {
          el.textContent = '↕';
          el.classList.remove('text-green');
        }
      });
    }

    function toggleTheme() {
      const btn = document.getElementById('themeBtn');
      if (isDark) {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('theme-light');
        document.body.classList.add('theme-dark');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      }
      isDark = !isDark;
    }

    function clearPrompt() {
      document.getElementById('prompt').value = '';
      updateCount();
    }

    function useExample(type) {
      const ex = {
        code: '// React login\nfunction Login() {\n  const [e, s] = useState("");\n  return <input value={e}/>;\n}',
        summary: 'Write a summary about AI impact on software development.'
      };
      document.getElementById('prompt').value = ex[type];
      updateCount();
      toast('Ejemplo cargado');
    }

    function sortBy(f) {
      if (sortF === f) sortA = !sortA;
      else { sortF = f; sortA = true; }
      updateSortIcons();
      renderResults();
    }

    function copyTop() {
      if (!results.length) return;
      const t = results[0];
      navigator.clipboard.writeText(`${t.provider} - ${t.fullName}: $${t.total.toFixed(4)}`);
      toast('Copiado');
    }

    // Load data
    async function loadModels() {
      const loader = document.getElementById('loader');
      const modelText = document.getElementById('modelText');
      const emptyState = document.getElementById('emptyState');
      const errorState = document.getElementById('errorState');
      
      loader.classList.remove('bg-green-500');
      loader.classList.add('bg-tertiary');
      modelText.textContent = 'Cargando...';
      emptyState.classList.add('hidden');
      errorState.classList.add('hidden');
      
      try {
        const res = await fetch('https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json');
        
        if (!res.ok) throw new Error('Error de red');
        
        const data = await res.json();
        
        allModels = Object.keys(data)
          .filter(k => {
            const m = data[k];
            return m.mode === "chat" && 
              typeof m.input_cost_per_token === "number" && 
              typeof m.output_cost_per_token === "number" && 
              m.input_cost_per_token > 0;
          })
          .map(k => {
            const m = data[k];
            return {
              provider: (m.litellm_provider || 'other').charAt(0).toUpperCase() + (m.litellm_provider || 'other').slice(1),
              name: k.length > 40 ? k.substring(0,37) + '...' : k,
              fullName: k,
              input: parseFloat((m.input_cost_per_token * 1e6).toFixed(4)),
              output: parseFloat((m.output_cost_per_token * 1e6).toFixed(4))
            };
          });

        const provs = [...new Set(allModels.map(m => m.provider))].sort();
        const sel = document.getElementById('providerFilter');
        sel.innerHTML = '<option value="">Todos los proveedores</option>';
        provs.forEach(p => { 
          const o = document.createElement('option'); 
          o.value = p; 
          o.textContent = p; 
          sel.appendChild(o); 
        });

        loader.classList.remove('bg-tertiary');
        loader.classList.add('bg-green-500');
        modelText.textContent = allModels.length + ' modelos';
        
      } catch(e) {
        console.error(e);
        loader.classList.remove('bg-tertiary');
        loader.classList.add('bg-red-500');
        modelText.textContent = 'Error';
        emptyState.classList.add('hidden');
        errorState.classList.remove('hidden');
        document.getElementById('errorMsg').textContent = 'Error al cargar datos: ' + e.message;
        toast('Error al cargar', 'error');
      }
    }

    function estTokens(t) { return t ? Math.ceil(t.length / 4) : 0; }
    
    function updateCount() {
      const v = document.getElementById('prompt').value;
      document.getElementById('charCount').textContent = v.length + ' ch';
      document.getElementById('tokenCount').textContent = '~' + estTokens(v) + ' tk';
    }

    function calcularCostos() {
      const prompt = document.getElementById('prompt').value;
      const out = parseFloat(document.getElementById('outputTokens').value) || 0;
      const inT = estTokens(prompt);

      if (!allModels.length) { 
        toast('Cargando modelos...', 'info'); 
        return; 
      }

      // Filter first
      results = filtrar();
      
      // Calculate costs
      results = results.map(m => ({ 
        ...m, 
        total: (inT * m.input + out * m.output) / 1e6 
      }));
      
      if (!results.length) { 
        toast('Sin resultados', 'error'); 
        return; 
      }

      // Sort
      results.sort((a, b) => {
        const av = a[sortF], bv = b[sortF];
        if (typeof av === 'string') {
          return sortA ? av.localeCompare(bv) : bv.localeCompare(av);
        }
        return sortA ? av - bv : bv - av;
      });

      renderResults();
      updateStatsBar(prompt);
    }

    function renderResults() {
      let html = '';
      results.forEach((m, i) => {
        const top = i < 3;
        html += `<tr class="table-row border-b" style="border-color: var(--border)">
          <td class="px-2 py-1.5 font-medium ${top ? 'text-green' : 'text-primary'}">${m.provider}</td>
          <td class="col-span-2 px-2 py-1.5 text-[10px] text-secondary" title="${m.fullName}">${m.name}</td>
          <td class="px-2 py-1.5 text-right text-tertiary">$${m.input.toFixed(2)}</td>
          <td class="px-2 py-1.5 text-right text-tertiary">$${m.output.toFixed(2)}</td>
          <td class="px-2 py-1.5 text-right font-semibold ${top ? 'text-green' : 'text-primary'}">$${m.total.toFixed(4)}</td>
        </tr>`;
      });

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('errorState').classList.add('hidden');
      document.getElementById('tableBody').innerHTML = html;
      document.getElementById('tableBody').classList.remove('hidden');
      document.getElementById('count').textContent = results.length + ' modelos';
      document.getElementById('exportBtn').classList.remove('hidden');
      document.getElementById('copyBtn').classList.remove('hidden');
    }

    function updateStatsBar(prompt) {
      if (!results.length) return;
      
      const min = results[0].total;
      const max = results[results.length-1].total;
      const avg = results.reduce((a,b) => a + b.total, 0) / results.length;
      const topProvider = results[0].provider;
      
      document.getElementById('minCost').textContent = '$' + min.toFixed(4);
      document.getElementById('maxCost').textContent = '$' + max.toFixed(4);
      document.getElementById('avgCost').textContent = '$' + avg.toFixed(4);
      document.getElementById('topProvider').textContent = topProvider;
      document.getElementById('statsBar').classList.remove('hidden');

      // Save stats
      if (prompt.length > 0) {
        stats.calcs++;
        stats.saved += (max - min);
        updateStats();
        saveStats();
      }
    }

    function filtrar() {
      const s = document.getElementById('search').value.toLowerCase().trim();
      const p = document.getElementById('providerFilter').value;
      return allModels.filter(m => 
        (!s || m.name.toLowerCase().includes(s) || m.provider.toLowerCase().includes(s)) && 
        (!p || m.provider === p)
      );
    }

    function exportCSV() {
      if (!results.length) return;
      const csv = [
        ['Proveedor', 'Modelo', 'Input ($/M)', 'Output ($/M)', 'Coste ($)'],
        ...results.map(m => [m.provider, m.fullName, m.input, m.output, m.total.toFixed(4)])
      ].map(r => r.join(',')).join('\n');
      
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = 'tokentax.csv';
      a.click();
      toast('CSV exportado');
    }

    // Events
    document.getElementById('search').addEventListener('input', calcularCostos);
    document.getElementById('providerFilter').addEventListener('change', calcularCostos);
    
    document.getElementById('prompt').addEventListener('input', () => { 
      updateCount(); 
      if (!document.getElementById('tableBody').classList.contains('hidden')) {
        calcularCostos();
      }
    });
    
    document.getElementById('outputTokens').addEventListener('input', () => { 
      if (!document.getElementById('tableBody').classList.contains('hidden')) {
        calcularCostos();
      }
    });
    
    document.addEventListener('keydown', e => { 
      if (e.ctrlKey && e.key === 'Enter') { 
        e.preventDefault(); 
        calcularCostos(); 
      } 
    });
    
    window.onload = () => { 
      loadModels(); 
      updateCount();
      updateSortIcons();
    };
  </script>
</body>
</html>
