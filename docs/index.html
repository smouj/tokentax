<!DOCTYPE html>
<html lang="es" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokenTax AI PRO • +400 Modelos • Precios Reales 2026</title>
  <meta name="description" content="Compara +400 modelos de IA de todos los proveedores. Encuentra el más barato.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); }
    .glow { box-shadow: 0 0 60px rgba(59, 130, 246, 0.15); }
    .table-row:hover { background: rgba(39, 39, 42, 0.8); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div class="h-full flex flex-col">
    <!-- Header -->
    <header class="flex-shrink-0 px-6 py-4 border-b border-zinc-800">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center font-bold text-lg">T</div>
          <div>
            <h1 class="text-xl font-bold tracking-tight">TokenTax <span class="text-blue-400">AI PRO</span></h1>
            <p class="text-xs text-zinc-500">+400 modelos • Precios en vivo</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span id="modelCount" class="text-sm text-zinc-400">Cargando...</span>
          <a href="https://github.com/smouj/tokentax" target="_blank" class="text-zinc-400 hover:text-white transition">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden">
      <div class="h-full max-w-7xl mx-auto px-6 py-4 flex gap-4">
        <!-- Left Panel - Input -->
        <div class="w-1/3 flex flex-col gap-4">
          <!-- Prompt Input -->
          <div class="glass rounded-2xl p-5 border border-zinc-800 glow flex-1 flex flex-col">
            <label class="block text-sm font-medium text-zinc-400 mb-2">💬 Tu prompt</label>
            <textarea id="prompt" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl p-4 text-sm focus:outline-none focus:border-blue-500 resize-none" placeholder="Pega tu prompt aquí..."></textarea>
          </div>

          <!-- Output Tokens -->
          <div class="glass rounded-2xl p-5 border border-zinc-800">
            <label class="block text-sm font-medium text-zinc-400 mb-2">📤 Tokens de salida</label>
            <input type="number" id="outputTokens" value="500" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-4 text-2xl font-semibold text-center">
          </div>

          <!-- Calculate Button -->
          <button onclick="calcularCostos()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold py-4 rounded-2xl text-lg hover:opacity-90 transition-all shadow-lg shadow-blue-500/25">
            ⚡ Calcular +400 modelos
          </button>
        </div>

        <!-- Right Panel - Results -->
        <div class="w-2/3 flex flex-col glass rounded-2xl border border-zinc-800 overflow-hidden">
          <!-- Filters -->
          <div class="flex-shrink-0 p-4 border-b border-zinc-800 flex gap-3">
            <div class="flex-1 relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">🔍</span>
              <input id="search" type="text" placeholder="Buscar (grok, claude, llama...)" 
                class="w-full bg-zinc-900 border border-zinc-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <select id="providerFilter" class="bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
              <option value="">Todos</option>
            </select>
          </div>

          <!-- Table Header -->
          <div class="flex-shrink-0 grid grid-cols-6 gap-2 px-4 py-3 bg-zinc-800/50 text-xs font-medium text-zinc-400 uppercase tracking-wider">
            <div>Proveedor</div>
            <div class="col-span-2">Modelo</div>
            <div class="text-right">Input</div>
            <div class="text-right">Output</div>
            <div class="text-right">Coste</div>
          </div>

          <!-- Table Body -->
          <div id="results" class="flex-1 overflow-y-auto">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-zinc-500">
              <div class="text-6xl mb-4">💰</div>
              <p class="text-lg font-medium">Introduce un prompt y calcula</p>
              <p class="text-sm">Verás los 400+ modelos ordenados por precio</p>
            </div>
            <table class="w-full text-sm">
              <tbody id="tableBody" class="hidden"></tbody>
            </table>
          </div>

          <!-- Footer -->
          <div class="flex-shrink-0 px-4 py-2 border-t border-zinc-800 flex justify-between items-center text-xs text-zinc-500">
            <span id="count"></span>
            <span>Datos: LiteLLM</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let allModels = [];

    async function cargarModelos() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json');
        const data = await res.json();
        
        allModels = Object.keys(data)
          .filter(key => {
            const m = data[key];
            return m.mode === "chat" && 
              typeof m.input_cost_per_token === "number" && 
              typeof m.output_cost_per_token === "number" &&
              m.input_cost_per_token > 0;
          })
          .map(key => {
            const m = data[key];
            const provider = m.litellm_provider || "otro";
            return {
              provider: provider.charAt(0).toUpperCase() + provider.slice(1),
              name: key.length > 50 ? key.substring(0,47) + "..." : key,
              input: (m.input_cost_per_token * 1000000).toFixed(4),
              output: (m.output_cost_per_token * 1000000).toFixed(4)
            };
          });

        const providers = [...new Set(allModels.map(m => m.provider))].sort();
        const select = document.getElementById('providerFilter');
        providers.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          select.appendChild(opt);
        });

        document.getElementById('modelCount').textContent = `${allModels.length} modelos`;
        console.log(`✅ Cargados ${allModels.length} modelos`);
      } catch(e) {
        console.error(e);
        document.getElementById('modelCount').textContent = "Error";
      }
    }

    function estimateTokens(text) {
      return text ? Math.ceil(text.length / 4) : 0;
    }

    function calcularCostos() {
      const prompt = document.getElementById('prompt').value;
      const outputTokens = parseFloat(document.getElementById('outputTokens').value) || 0;
      const inputTokens = estimateTokens(prompt);

      if (allModels.length === 0) {
        alert("Cargando modelos...");
        return;
      }

      const filtered = filtrarModelosActuales();

      if (filtered.length === 0) {
        alert("No hay modelos que coincidan con tu búsqueda");
        return;
      }

      let html = '';
      filtered.forEach((model, i) => {
        const costInput = (inputTokens * parseFloat(model.input)) / 1000000;
        const costOutput = (outputTokens * parseFloat(model.output)) / 1000000;
        const total = costInput + costOutput;
        
        const isTop3 = i < 3;
        const rowClass = isTop3 ? 'bg-green-900/20' : '';

        html += `
          <tr class="table-row border-b border-zinc-800/50 ${rowClass}">
            <td class="px-2 py-3 font-medium ${isTop3 ? 'text-green-400' : 'text-zinc-300'}">${model.provider}</td>
            <td class="col-span-2 px-2 py-3 font-mono text-xs">${model.name}</td>
            <td class="px-2 py-3 text-right font-mono text-zinc-400">$${model.input}</td>
            <td class="px-2 py-3 text-right font-mono text-zinc-400">$${model.output}</td>
            <td class="px-2 py-3 text-right font-bold ${isTop3 ? 'text-green-400' : 'text-white'}">$${total.toFixed(4)}</td>
          </tr>`;
      });

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('tableBody').innerHTML = html;
      document.getElementById('tableBody').classList.remove('hidden');
      document.getElementById('count').textContent = `${filtered.length} modelos`;
    }

    function filtrarModelosActuales() {
      const search = document.getElementById('search').value.toLowerCase().trim();
      const providerSel = document.getElementById('providerFilter').value;

      return allModels
        .filter(m => {
          const matchSearch = !search || 
            m.name.toLowerCase().includes(search) || 
            m.provider.toLowerCase().includes(search);
          const matchProvider = !providerSel || m.provider === providerSel;
          return matchSearch && matchProvider;
        })
        .sort((a,b) => parseFloat(a.input) - parseFloat(b.input));
    }

    document.getElementById('search').addEventListener('input', calcularCostos);
    document.getElementById('providerFilter').addEventListener('change', calcularCostos);
    document.getElementById('prompt').addEventListener('input', () => {
      if (document.getElementById('tableBody').classList.contains('hidden') === false) {
        calcularCostos();
      }
    });

    window.onload = cargarModelos;
  </script>
</body>
</html>
