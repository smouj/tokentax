<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect fill="#000000" width="100" height="100" rx="18"/>
  <!-- Subtle border accent -->
  <rect fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.25" width="97" height="97" x="1.5" y="1.5" rx="17"/>
  <!-- T horizontal bar -->
  <rect x="16" y="22" width="68" height="14" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <!-- T vertical stem -->
  <rect x="43" y="36" width="14" height="42" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <!-- $ accents bottom corners -->
  <circle cx="22" cy="72" r="5" fill="#f59e0b" opacity="0.55"/>
  <circle cx="78" cy="72" r="5" fill="#f59e0b" opacity="0.55"/>
  <text x="22" y="76" font-family="monospace" font-size="7" fill="#000" font-weight="900" text-anchor="middle">$</text>
  <text x="78" y="76" font-family="monospace" font-size="7" fill="#000" font-weight="900" text-anchor="middle">$</text>
</svg>
